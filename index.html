<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최신 인기 플랫폼 통합 링크 센터</title>
    <meta name="description" content="가장 빠르고 안전한 최신 인기 플랫폼 전용 링크와 역대급 가입 혜택을 한눈에 확인하세요.">
    <meta name="keywords" content="플랫폼추천, 무료쿠폰, 최신링크, 통합센터">
    
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .header p {
            color: #64748b;
            font-size: 15px;
        }
        /* ⭐ 링크 카드 스타일 */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        .info-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .badge {
            background-color: #ef4444;
            color: #fff;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
        }
        .title-text h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #0f172a;
        }
        .title-text p {
            margin: 0;
            font-size: 13px;
            color: #64748b;
        }
        /* 🎯 클릭 유도 액션 버튼 */
        .btn-link {
            background-color: #2563eb;
            color: #fff;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .btn-link:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌐 프리미엄 최신 플랫폼 링크 센터</h1>
        <p>검증된 공식 파트너사의 안전한 다이렉트 연결 및 단독 혜택망입니다.</p>
    </div>

    <div class="card-list">
        <div class="card">
            <div class="info-area">
                <div class="badge">HOT</div>
                <div class="title-text">
                    <h3>에이급 추천 서비스 플랫폼</h3>
                    <p>신규 가입 시 초고속 무제한 패스 및 10,000 포인트 즉시 지급</p>
                </div>
            </div>
            <a href="https://제휴사이트주소.com/partner_code=ch_jeon1" target="_blank" class="btn-link">바로가기</a>
        </div>

        <div class="card">
            <div class="info-area">
                <div class="badge" style="background-color: #3b82f6;">추천</div>
                <div class="title-text">
                    <h3>비급 고화질 스트리밍 센터</h3>
                    <p>모바일 APP 다운로드 시 한 달 무료 감상 특별 프로모션 적용</p>
                </div>
            </div>
            <a href="https://제휴사이트주소.com/partner_code=ch_jeon2" target="_blank" class="btn-link">바로가기</a>
        </div>

        <div class="card">
            <div class="info-area">
                <div class="badge" style="background-color: #10b981;">EVENT</div>
                <div class="title-text">
                    <h3>씨급 대용량 자료실 정보망</h3>
                    <p>매일 출석 체크 시 무료 다운로드 쿠폰 매일 3장 기본 제공</p>
                </div>
            </div>
            <a href="https://제휴사이트주소.com/partner_code=ch_jeon3" target="_blank" class="btn-link">바로가기</a>
        </div>
    </div>
</div>

</body>
</html>
